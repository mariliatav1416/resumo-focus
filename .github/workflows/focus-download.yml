name: Focus - download e extração

# Baixa o PDF do Focus e extrai o texto, semanalmente e sob demanda.
# Os scripts apenas baixam e extraem; o resumo executivo é escrito por um
# agente em outra etapa (ver README.md).
on:
  schedule:
    # Segunda-feira, 09h15 BRT = 12h15 UTC (cron do GitHub Actions roda em UTC).
    - cron: "15 12 * * 1"
  workflow_dispatch: {}

# Necessário para o job commitar os arquivos baixados de volta ao repositório.
permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar o Focus mais recente
        run: python src/baixar_focus.py

      - name: Extrair o texto do PDF
        run: python src/extrair_texto.py

      - name: Commitar os arquivos baixados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt
          # Só commita se houver de fato algo novo (evita falhar em execução repetida).
          if git diff --staged --quiet; then
            echo "Nenhum arquivo novo do Focus para commitar."
          else
            git commit -m "Focus: download automático ($(date -u +%Y-%m-%d))"
            git push
          fi
