name: Focus - enviar resumo por e-mail

# Dispara quando um HTML de resumo é commitado em main, ou manualmente.
on:
  push:
    branches:
      - main
    paths:
      - "output/focus/focus_*.html"
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Enviar resumo por e-mail
        env:
          FOCUS_SMTP_USER: ${{ secrets.FOCUS_SMTP_USER }}
          FOCUS_SMTP_APP_PASSWORD: ${{ secrets.FOCUS_SMTP_APP_PASSWORD }}
          FOCUS_EMAIL_DEST: ${{ secrets.FOCUS_EMAIL_DEST }}
          FOCUS_EMAIL_BCC: ${{ secrets.FOCUS_EMAIL_BCC }}
        run: python src/enviar_email.py
